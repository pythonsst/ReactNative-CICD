name: CI

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test, Version Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Tests
        run: yarn test

      - name: Lefthook CI hook
        run: yarn lefthook run ci-hook

      # Informational version consistency check across package.json + native files.
      - name: EAS version consistency
        run: yarn eas:version:get
